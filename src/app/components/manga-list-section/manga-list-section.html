<div class="manga-group">
  @for (list of mangaListArray(); track list.id) {
    <div class="manga-element">
      <app-manga-cover-list [dataArray]="list.mangas" />
      <div class="text-section">
        <h2 class="title-section">{{ list.title }}</h2>
        <div class="fav-group">
          <div class="icon-container" (click)="addToFavList(list.id)">
            <app-svg-icons class="icon-star" [path]="getIcon(list.id)" />
          </div>
          <span class="fav-text">Favorites</span>
        </div>
        <p>
          {{ list.description }}
        </p>
        <div class="info-section">
          <span>{{ list.owner.firstname }}</span>
          <span>{{ list.createdAt | date: 'mediumDate' }}</span>
          <span>{{ list.mangas.length }} manga</span>
        </div>
      </div>
    </div>
  }
</div>
