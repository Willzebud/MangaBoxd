<div class="manga-group">
  @for (manga of mangaLists(); track manga.id) {
    @if (manga.isPublic) {
      <div class="manga-element">
        <app-manga-cover-list [dataArray]="manga.mangas" />
        <div class="text-section">
          <h2 class="title-section">{{ manga.title }}</h2>
          <p>
            {{ manga.description }}
          </p>
          <div class="info-section">
            <span>{{ manga.owner.firstname }}</span>
            <span>{{ manga.createdAt | date : 'mediumDate'}}</span>
            <span>{{manga.mangas.length}} manga</span>
          </div>
        </div>
      </div>
    }
  }
</div>
